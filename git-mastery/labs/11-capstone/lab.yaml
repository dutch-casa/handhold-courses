workspace: fresh
test: bash local/test.sh
setup:
  - git config --global user.email "learner@handhold.io"
  - git config --global user.name "Learner"
  - git config --global init.defaultBranch main
  - git config --global core.editor "true"
  - mkdir remote.git && git init --bare remote.git
  - git clone remote.git local
  - "cd local && echo '{\"name\":\"calculator-project\"}' > package.json && echo '# Calculator' > README.md && git add . && git commit -m 'chore: initial setup' && git push origin main"
  - cp calculator.js local/calculator.js
  - cp test.sh local/test.sh
open:
  - local/calculator.js
